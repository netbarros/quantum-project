version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: quantum_project
      POSTGRES_USER: quantum
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - "3001:3001"
    env_file: ./backend/.env
    environment:
      # Override the host-facing DATABASE_URL from .env so the container
      # reaches the postgres service by its Compose service hostname.
      DATABASE_URL: postgresql://quantum:${DB_PASSWORD:-password}@postgres:5432/quantum_project
    depends_on:
      - postgres

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    env_file: ./frontend/.env
    depends_on:
      - backend

volumes:
  pgdata:
